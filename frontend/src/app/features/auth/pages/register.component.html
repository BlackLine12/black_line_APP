<section class="flex min-h-screen items-center justify-center bg-gray-950 px-4 py-8">
  <div class="w-full max-w-lg space-y-8">

    <!-- Brand -->
    <div class="animate-fade-in-down text-center">
      <h1 class="text-4xl font-extrabold tracking-tight text-white transition-transform hover:scale-105">Black<span class="text-indigo-500">Line</span></h1>
      <p class="mt-2 text-sm text-gray-400">Crea tu cuenta para empezar</p>
    </div>

    <!-- Card -->
    <div class="animate-fade-in-up rounded-2xl border border-gray-800 bg-gray-900 p-8 shadow-xl delay-200">

      <!-- Success -->
      @if (successMessage) {
        <div class="mb-5 rounded-lg border border-green-800 bg-green-900/30 px-4 py-3 text-sm text-green-300">
          {{ successMessage }}
        </div>
      }

      <!-- Error -->
      @if (errorMessage) {
        <div class="mb-5 rounded-lg border border-red-800 bg-red-900/30 px-4 py-3 text-sm text-red-300">
          {{ errorMessage }}
        </div>
      }

      <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="space-y-5">

        <!-- Name row -->
        <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
          <div>
            <label for="first_name" class="mb-1 block text-sm font-medium text-gray-300">Nombre</label>
            <input id="first_name" formControlName="first_name" type="text" placeholder="Juan"
              class="w-full rounded-lg border border-gray-700 bg-gray-800 px-4 py-2.5 text-sm text-white placeholder-gray-500 focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500" />
          </div>
          <div>
            <label for="last_name" class="mb-1 block text-sm font-medium text-gray-300">Apellido</label>
            <input id="last_name" formControlName="last_name" type="text" placeholder="Pérez"
              class="w-full rounded-lg border border-gray-700 bg-gray-800 px-4 py-2.5 text-sm text-white placeholder-gray-500 focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500" />
          </div>
        </div>

        <!-- Username -->
        <div>
          <label for="username" class="mb-1 block text-sm font-medium text-gray-300">Nombre de usuario</label>
          <input id="username" formControlName="username" type="text" placeholder="juanperez"
            class="w-full rounded-lg border border-gray-700 bg-gray-800 px-4 py-2.5 text-sm text-white placeholder-gray-500 focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500" />
        </div>

        <!-- Email -->
        <div>
          <label for="reg_email" class="mb-1 block text-sm font-medium text-gray-300">Correo electrónico</label>
          <input id="reg_email" formControlName="email" type="email" placeholder="tu@email.com"
            class="w-full rounded-lg border border-gray-700 bg-gray-800 px-4 py-2.5 text-sm text-white placeholder-gray-500 focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500" />
        </div>

        <!-- Phone -->
        <div>
          <label for="phone" class="mb-1 block text-sm font-medium text-gray-300">Teléfono <span class="text-gray-500">(opcional)</span></label>
          <input id="phone" formControlName="phone" type="tel" placeholder="+52 614 123 4567"
            class="w-full rounded-lg border border-gray-700 bg-gray-800 px-4 py-2.5 text-sm text-white placeholder-gray-500 focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500" />
        </div>

        <!-- User type -->
        <div>
          <label class="mb-2 block text-sm font-medium text-gray-300">Tipo de cuenta</label>
          <div class="grid grid-cols-2 gap-3">
            <label
              [class]="registerForm.get('user_type')?.value === 'CLIENT'
                ? 'cursor-pointer rounded-xl border-2 border-indigo-500 bg-indigo-600/10 p-3 text-center transition'
                : 'cursor-pointer rounded-xl border-2 border-gray-700 bg-gray-800 p-3 text-center transition hover:border-gray-500'"
            >
              <input type="radio" formControlName="user_type" value="CLIENT" class="sr-only" />
              <span class="block text-sm font-semibold text-white">Cliente</span>
              <span class="mt-0.5 block text-xs text-gray-400">Busco tatuador</span>
            </label>
            <label
              [class]="registerForm.get('user_type')?.value === 'STUDIO'
                ? 'cursor-pointer rounded-xl border-2 border-indigo-500 bg-indigo-600/10 p-3 text-center transition'
                : 'cursor-pointer rounded-xl border-2 border-gray-700 bg-gray-800 p-3 text-center transition hover:border-gray-500'"
            >
              <input type="radio" formControlName="user_type" value="STUDIO" class="sr-only" />
              <span class="block text-sm font-semibold text-white">Artista / Estudio</span>
              <span class="mt-0.5 block text-xs text-gray-400">Ofrezco servicio</span>
            </label>
          </div>
        </div>

        <!-- Passwords -->
        <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
          <div>
            <label for="reg_password" class="mb-1 block text-sm font-medium text-gray-300">Contraseña</label>
            <input id="reg_password" formControlName="password" type="password" placeholder="••••••••"
              class="w-full rounded-lg border border-gray-700 bg-gray-800 px-4 py-2.5 text-sm text-white placeholder-gray-500 focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500" />
          </div>
          <div>
            <label for="reg_password_confirm" class="mb-1 block text-sm font-medium text-gray-300">Confirmar</label>
            <input id="reg_password_confirm" formControlName="password_confirm" type="password" placeholder="••••••••"
              class="w-full rounded-lg border border-gray-700 bg-gray-800 px-4 py-2.5 text-sm text-white placeholder-gray-500 focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500" />
          </div>
        </div>

        <!-- Submit -->
        <button
          type="submit"
          [disabled]="registerForm.invalid || loading"
          class="flex w-full items-center justify-center gap-2 rounded-xl bg-indigo-600 px-4 py-2.5 text-sm font-semibold text-white shadow transition hover:bg-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 focus:ring-offset-gray-950 disabled:cursor-not-allowed disabled:opacity-50"
        >
          @if (loading) {
            <svg class="h-4 w-4 animate-spin" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"></path>
            </svg>
          }
          {{ loading ? 'Creando cuenta…' : 'Crear Cuenta' }}
        </button>
      </form>
    </div>

    <!-- Login link -->
    <p class="animate-fade-in text-center text-sm text-gray-400 delay-400">
      ¿Ya tienes cuenta?
      <a routerLink="/auth/login" class="font-medium text-indigo-400 transition-colors hover:text-indigo-300">Inicia sesión</a>
    </p>
  </div>
</section>
