<div class="auth-split">

  <!-- ── PANEL ARTE (izquierda) ───────────────────────────────────────── -->
  <aside class="auth-split__art">
    <div class="auth-split__art-img"></div>
    <div class="auth-split__art-grad-v"></div>
    <div class="auth-split__art-grad-h"></div>

    <!-- Logo flotante -->
    <div class="art-logo">
      <span class="art-logo__bar"></span>
      <span class="art-logo__text">BL</span>
    </div>

    <!-- Cita -->
    <div class="art-quote">
      <p class="art-quote__text">Tu piel, tu historia</p>
      <span class="art-quote__attr">— Donde el arte cobra vida</span>
    </div>

    <!-- Stats barra inferior -->
    <div class="art-stats">
      <div class="art-stat">
        <span class="art-stat__num">340+</span>
        <span class="art-stat__label">Artistas</span>
      </div>
      <div class="art-stat">
        <span class="art-stat__num">2.8K+</span>
        <span class="art-stat__label">Tatuajes</span>
      </div>
      <div class="art-stat">
        <span class="art-stat__num">98%</span>
        <span class="art-stat__label">Satisfacción</span>
      </div>
    </div>
  </aside>

  <!-- ── PANEL FORMULARIO (derecha) ───────────────────────────────────── -->
  <main class="auth-split__form">
    <div class="auth-card">

      <!-- Brand -->
      <div class="auth-card__brand">
        <span class="auth-card__brand-line"></span>
        <div class="auth-card__brand-inner">
          <span class="auth-card__logo-square"></span>
          <span class="auth-card__logo-name">BlackLine</span>
          <span class="auth-card__logo-tagline">El arte que llevas en la piel</span>
        </div>
      </div>

      <!-- Divider ACCEDER -->
      <div class="auth-divider">
        <span class="auth-divider__line"></span>
        <span class="auth-divider__text">ACCEDER</span>
        <span class="auth-divider__line"></span>
      </div>

      <!-- Error -->
      @if (errorMessage) {
        <div class="auth-alert auth-alert--error" role="alert">
          {{ errorMessage }}
        </div>
      }

      <!-- Form -->
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-fields">

        <div class="auth-field">
          <label class="auth-field__label" for="credential">Email o nombre de usuario</label>
          <input
            id="credential"
            class="auth-field__input"
            formControlName="credential"
            type="text"
            autocomplete="username"
            placeholder="tu@email.com"
          />
        </div>

        <div class="auth-field">
          <label class="auth-field__label" for="password">Contraseña</label>
          <input
            id="password"
            class="auth-field__input"
            formControlName="password"
            type="password"
            autocomplete="current-password"
            placeholder="••••••••"
          />
        </div>

        <div class="auth-remember">
          <label class="auth-remember__check">
            <input type="checkbox" /> Recuérdame
          </label>
          <a class="auth-remember__forgot" routerLink="/auth/login">¿Olvidaste tu contraseña?</a>
        </div>

        <button
          type="submit"
          class="auth-btn-submit"
          [disabled]="loginForm.invalid || loading"
        >
          @if (loading) {
            <svg class="auth-btn-submit__spinner" viewBox="0 0 24 24" fill="none">
              <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" stroke-dasharray="60" stroke-dashoffset="15"/>
            </svg>
          }
          {{ loading ? 'Entrando…' : 'Iniciar Sesión' }}
        </button>
      </form>

      <!-- Divider social -->
      <div class="auth-divider auth-divider--soft">
        <span class="auth-divider__line"></span>
        <span class="auth-divider__text auth-divider__text--soft">o continua con</span>
        <span class="auth-divider__line"></span>
      </div>

      <!-- Social (decorativos — no funcionales en MVP) -->
      <div class="auth-socials">
        <button class="auth-social-btn" type="button" disabled>
          <strong>G</strong> Google
        </button>
        <button class="auth-social-btn" type="button" disabled>
          <strong>&#63743;</strong> Apple
        </button>
      </div>

      <!-- Register link -->
      <div class="auth-footer-link">
        <span>¿No tienes cuenta?</span>
        <a routerLink="/auth/register" class="auth-footer-link__cta">Regístrate</a>
      </div>

      <!-- Secure badge -->
      <div class="auth-secure">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          <path d="m9 12 2 2 4-4"/>
        </svg>
        Conexión segura y encriptada
      </div>

    </div>
  </main>
</div>
