<div class="error-page">
  <div class="error-page__inner">

    <div class="error-page__code">403</div>

    <div class="error-page__glyph">✦</div>

    <h1 class="error-page__title">Acceso restringido</h1>
    <p class="error-page__subtitle">
      No tienes permiso para ver esta sección.<br>
      Regresa a tu panel o inicia sesión con otra cuenta.
    </p>

    <div class="error-page__actions">
      <a [routerLink]="dashboardRoute" class="btn-gold">Ir a mi panel</a>
    </div>

  </div>
</div>
