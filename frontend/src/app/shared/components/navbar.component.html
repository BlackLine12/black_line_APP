<nav class="animate-fade-in-down sticky top-0 z-50 border-b border-gray-800 bg-gray-950/90 backdrop-blur-md">
  <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-3 sm:px-6">

    <!-- Brand -->
    <a routerLink="/" class="text-xl font-extrabold tracking-tight text-white transition-transform hover:scale-105">
      Black<span class="text-indigo-500">Line</span>
    </a>

    <!-- Desktop nav -->
    <div class="hidden items-center gap-1 sm:flex">

      <!-- Studio links -->
      @if (isStudio) {
        <a routerLink="/studio/dashboard" routerLinkActive="text-indigo-400 bg-gray-800/60"
           class="rounded-lg px-3 py-2 text-sm font-medium text-gray-300 transition hover:bg-gray-800 hover:text-white">
          Dashboard
        </a>
        <a routerLink="/studio/portafolio" routerLinkActive="text-indigo-400 bg-gray-800/60"
           class="rounded-lg px-3 py-2 text-sm font-medium text-gray-300 transition hover:bg-gray-800 hover:text-white">
          Portafolio
        </a>
        <a routerLink="/studio/agenda" routerLinkActive="text-indigo-400 bg-gray-800/60"
           class="rounded-lg px-3 py-2 text-sm font-medium text-gray-300 transition hover:bg-gray-800 hover:text-white">
          Agenda
        </a>
      }

      <!-- Client links -->
      @if (isClient) {
        <a routerLink="/client/cotizador" routerLinkActive="text-indigo-400 bg-gray-800/60"
           class="rounded-lg px-3 py-2 text-sm font-medium text-gray-300 transition hover:bg-gray-800 hover:text-white">
          Cotizador
        </a>
        <a routerLink="/client/match" routerLinkActive="text-indigo-400 bg-gray-800/60"
           class="rounded-lg px-3 py-2 text-sm font-medium text-gray-300 transition hover:bg-gray-800 hover:text-white">
          Match
        </a>
        <a routerLink="/client/mis-citas" routerLinkActive="text-indigo-400 bg-gray-800/60"
           class="rounded-lg px-3 py-2 text-sm font-medium text-gray-300 transition hover:bg-gray-800 hover:text-white">
          Mis Citas
        </a>
      }
    </div>

    <!-- Right side: user info + logout -->
    <div class="flex items-center gap-3">
      <span class="hidden text-sm text-gray-400 sm:block">{{ userName }}</span>

      <button (click)="logout()"
        class="rounded-lg border border-gray-700 px-3 py-1.5 text-sm font-medium text-gray-300 transition hover:border-red-500 hover:text-red-400">
        Salir
      </button>

      <!-- Mobile hamburger -->
      <button (click)="toggleMenu()" class="rounded-lg p-1.5 text-gray-400 hover:text-white sm:hidden">
        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          @if (mobileMenuOpen) {
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
          } @else {
            <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"/>
          }
        </svg>
      </button>
    </div>
  </div>

  <!-- Mobile menu -->
  @if (mobileMenuOpen) {
    <div class="animate-fade-in-down border-t border-gray-800 px-4 pb-4 pt-2 sm:hidden">
      @if (isStudio) {
        <a routerLink="/studio/dashboard" (click)="mobileMenuOpen = false"
           class="block rounded-lg px-3 py-2 text-sm font-medium text-gray-300 hover:bg-gray-800 hover:text-white">Dashboard</a>
        <a routerLink="/studio/portafolio" (click)="mobileMenuOpen = false"
           class="block rounded-lg px-3 py-2 text-sm font-medium text-gray-300 hover:bg-gray-800 hover:text-white">Portafolio</a>
        <a routerLink="/studio/agenda" (click)="mobileMenuOpen = false"
           class="block rounded-lg px-3 py-2 text-sm font-medium text-gray-300 hover:bg-gray-800 hover:text-white">Agenda</a>
      }
      @if (isClient) {
        <a routerLink="/client/cotizador" (click)="mobileMenuOpen = false"
           class="block rounded-lg px-3 py-2 text-sm font-medium text-gray-300 hover:bg-gray-800 hover:text-white">Cotizador</a>
        <a routerLink="/client/match" (click)="mobileMenuOpen = false"
           class="block rounded-lg px-3 py-2 text-sm font-medium text-gray-300 hover:bg-gray-800 hover:text-white">Match</a>
        <a routerLink="/client/mis-citas" (click)="mobileMenuOpen = false"
           class="block rounded-lg px-3 py-2 text-sm font-medium text-gray-300 hover:bg-gray-800 hover:text-white">Mis Citas</a>
      }
    </div>
  }
</nav>
