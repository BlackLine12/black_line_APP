<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block subject %}BlackLine{% endblock %}</title>
</head>
<body style="margin:0;padding:0;background-color:#080604;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;">

  <!-- Wrapper -->
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0"
         style="background-color:#080604;padding:40px 20px;">
    <tr>
      <td align="center">
        <table role="presentation" width="600" cellspacing="0" cellpadding="0" border="0"
               style="max-width:600px;width:100%;">

          <!-- Header / Logo -->
          <tr>
            <td style="padding:0 0 32px 0;text-align:center;">
              <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0"
                     style="background-color:#0C0A08;border:1px solid #2A2420;border-radius:10px 10px 0 0;padding:28px 40px;">
                <tr>
                  <td align="center">
                    <span style="font-family:Georgia,'Times New Roman',serif;font-size:26px;font-weight:700;
                                 color:#EDE0C4;letter-spacing:0.06em;">BLACK</span>
                    <span style="font-family:Georgia,'Times New Roman',serif;font-size:26px;font-weight:400;
                                 color:#C9A84C;letter-spacing:0.06em;">LINE</span>
                  </td>
                </tr>
                <tr>
                  <td align="center" style="padding-top:6px;">
                    <span style="font-size:11px;color:#5A5248;letter-spacing:0.15em;text-transform:uppercase;">
                      Marketplace de Tatuajes &amp; Piercings
                    </span>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Body card -->
          <tr>
            <td style="background-color:#0C0A08;border:1px solid #2A2420;border-top:0;
                       border-radius:0 0 10px 10px;padding:40px;">
              {% block content %}{% endblock %}
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="padding:32px 0 0 0;text-align:center;">
              <p style="margin:0;font-size:12px;color:#5A5248;line-height:1.6;">
                Este correo fue enviado automáticamente por BlackLine.<br/>
                Por favor no respondas a este mensaje.
              </p>
              <p style="margin:12px 0 0 0;font-size:11px;color:#3A3630;">
                © 2025 BlackLine. Todos los derechos reservados.
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>

</body>
</html>
